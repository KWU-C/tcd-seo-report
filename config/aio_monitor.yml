# 株式会社TCD (https://tcd.jp/) SEO/AIO 月次レポート 設定ファイル
# WordPressテーマ販売のTCDではなく、ブランディング会社の株式会社TCDです

site_url: "https://tcd.jp/"

# 監視ページリスト（CSV で一元管理）
watching_csv: "Watching.csv"

# ──────────────────────────────────────────
# 重点キーワード
# 半角スペース・全角スペース・スペースなしのバリアントは
# スクリプト側でスペースを除去して正規化照合します
# ──────────────────────────────────────────
key_keywords:
  - "ブランディングとは"
  - "ブランディング 会社"
  - "ブランディング 会社 東京"
  - "ブランディング 会社 大阪"
  - "インナーブランディングとは"
  - "インナーブランディング ブランディング 会社"
  - "インナーブランディング 会社 東京"
  - "インナーブランディング 会社 大阪"

# ──────────────────────────────────────────
# ページ監視リストは Watching.csv で管理
# ──────────────────────────────────────────
# LP / CV ページ
# 末尾スラッシュ有無はスクリプト側で両方照合します
# ──────────────────────────────────────────
lp_cv_pages:
  - url: "https://tcd.jp/"
    name: "トップページ"
    type: "lp"
  - url: "https://tcd.jp/contact"
    name: "お問い合わせ"
    type: "cv"
  - url: "https://tcd.jp/download"
    name: "資料ダウンロード"
    type: "cv"

# ──────────────────────────────────────────
# Google AI Overview 観測設定
# playwright がインストールされている場合のみ実行
# ──────────────────────────────────────────
google_aio:
  enabled: true
  queries:
    - "ブランディング 会社"
    - "ブランディング 会社 東京"
    - "ブランディング 会社 大阪"
    - "インナーブランディング 会社"
    - "インナーブランディング 会社 東京"
    - "インナーブランディング 会社 大阪"
  engine: "google"
  google_domain: "google.co.jp"
  hl: "ja"
  gl: "jp"
  location: "Japan"

# ──────────────────────────────────────────
# レポート設定
# ──────────────────────────────────────────
report:
  top_n: 20
  aio_min_impressions: 50
  aio_alert_threshold: 0.4
